part_fp_list: ./t2v/configs/quant/opensora/remain_fp.txt
model:
  model_id: opensora
  model_type: opensora
conditional: true
cfg_split: true
calib_data:
  path: your path of calib data
  n_steps: 100
  batch_size: 2
  n_samples: 10
quant:
  weight:
    optimization:
      joint_weight_act_opt: false
      use_grad: false
      iters: 15000
      loss:
        lambda_coeff: 0.5
        warmup: 0.0
        reconstruction_loss_type: relation
      params:
        delta:
          lr: 1.0e-06
    quantizer:
      n_bits: 3
      per_group: channel
      scale_method: grid_search_lp
      channel_wise: true
      round_mode: nearest_ste
      sym: false
  activation:
    optimization:
      joint_weight_act_opt: false
      use_grad: false
      iters: 100
      loss:
        lambda_coeff: 0.5
        warmup: 0.0
      params: null
    quantizer:
      n_bits: 8
      per_group: token
      dynamic: true
      scale_method: min_max
      round_mode: nearest_ste
      running_stat: false
      sym: false
      n_spatial_token: 1024
      n_temporal_token: 16
      n_prompt: 120
      smooth_quant:
        enable: true
        channel_wise_scale_type: momentum_act_max
        momentum: 0.95
        alpha: 0.11
  grad_checkpoint: false
resume_with_w_quantized:
  path: None
